<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Switch Decoder Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>RF Switch Decoder</h1>
            <div class="search-bar">
                <input type="text" id="modelInput" placeholder="Enter Model Number..." autofocus>
                <button onclick="decode()">DECODE</button>
            </div>
        </header>

        <main id="display-area" style="display: none;">
            <div class="model-header">
                <span class="model-label">CURRENT MODEL</span>
                <div id="model-display" class="model-badge"></div>
            </div>

            <div class="grid-layout">
                <section id="output-box" class="card">
                    <h3>ELECTRICAL SPECS</h3>
                    <div id="spec-list" class="data-grid">
                        </div>
                    <div class="hint">Tap row to copy value</div>
                </section>

                <section class="card mechanical-card">
                    <h3>MECHANICAL & HOUSING</h3>
                    <div id="cavity-output" class="data-grid">
                        </div>
                    <div class="hint">Tap row to copy value</div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
